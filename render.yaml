# Render.com Blueprint — deploys BOTH the API and the static frontend (free tier).
# In Render: New + > Blueprint > pick this repo. Then set the two env vars below.
services:
  # ---- FastAPI backend ----
  - type: web
    name: mgnrega-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements-api.txt
    startCommand: uvicorn api.main:app --app-dir . --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # After the web (frontend) service deploys, set this to its URL,
      # e.g. https://mgnrega-web.onrender.com  (enables CORS).
      - key: CORS_ORIGINS
        sync: false
      # Groq LLM key for AI case files / reports (paste in the Render dashboard).
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-120b

  # ---- Static frontend (Vite build) ----
  - type: web
    name: mgnrega-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Set this to the API URL above, e.g. https://mgnrega-api.onrender.com
      - key: VITE_API_BASE
        sync: false
    routes:
      # SPA fallback so client-side routes (/states, /districts/...) work.
      - type: rewrite
        source: /*
        destination: /index.html
